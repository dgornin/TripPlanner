# Container-internal nginx: serves the built SPA and proxies /api/* to the
# backend service. The host's nginx (on the VM) terminates HTTPS and proxies
# everything to this container on a loopback port.

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # gzip text assets
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # /api/* → backend service (resolved via compose DNS)
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # SSE streaming — disable buffering so tokens flush live
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 120s;
    }

    # SPA fallback: any unknown path serves index.html so react-router works
    location / {
        try_files $uri /index.html;
    }
}
