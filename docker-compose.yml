# All credentials come from the runtime environment (.env or real env vars).
# No defaults are provided for secrets on purpose — misconfigured services
# should fail loud at startup rather than silently use a weak default.
#
# Required before `docker compose up`:
#   POSTGRES_USER POSTGRES_PASSWORD POSTGRES_DB
#   ANTHROPIC_API_KEY
#   JWT_SECRET
#   CORS_ORIGINS
#   TELEGRAM_BOT_TOKEN (optional — only needed for the bot service)
#   TELEGRAM_BOT_USERNAME (optional — controls the t.me deep-link)

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
    ports:
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    command: ["sh", "-c", "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"]
    volumes:
      # Persist the 460 MB multilingual MiniLM model across image rebuilds.
      # Without this the first kb_search after every rebuild downloads the
      # model through the outbound proxy and can time out the SSE stream.
      - hfcache:/root/.cache/huggingface
    environment:
      # Compose reassembles DATABASE_URL from the service-internal hostname.
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:?ANTHROPIC_API_KEY is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_ALG: ${JWT_ALG:-HS256}
      JWT_EXP_HOURS: ${JWT_EXP_HOURS:-72}
      CORS_ORIGINS: ${CORS_ORIGINS:?CORS_ORIGINS is required}
      USE_WHISPER: ${USE_WHISPER:-false}
      STT_MODEL: ${STT_MODEL:-small}
      SEED_RAG_ON_STARTUP: ${SEED_RAG_ON_STARTUP:-true}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME:-}
      TELEGRAM_PROXY_URL: ${TELEGRAM_PROXY_URL:-}
      # Outbound proxy for Anthropic (needed in regions where api.anthropic.com
      # is geo-blocked). httpx honours these standard env vars directly.
      HTTP_PROXY: ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,postgres,backend,bot,frontend}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${BACKEND_HOST_PORT:-8000}:8000"
    restart: unless-stopped

  bot:
    # Reuses the backend image: same code, different entrypoint. Saves
    # ~3 GB of disk and ~200 MB of RAM on a small VM.
    image: travelbuddy-backend:latest
    command: ["python", "-m", "app.bot.main"]
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:?TELEGRAM_BOT_TOKEN is required to run the bot service}
      TELEGRAM_PROXY_URL: ${TELEGRAM_PROXY_URL:-}
      JWT_SECRET: ${JWT_SECRET}
      HTTP_PROXY: ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,postgres,backend,bot,frontend}
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_started
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend
    ports:
      - "${FRONTEND_HOST_PORT:-5173}:80"
    restart: unless-stopped

volumes:
  pgdata: {}
  hfcache: {}
